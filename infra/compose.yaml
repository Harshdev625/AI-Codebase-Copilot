# ── Local-dev stack ──────────────────────────────────────────────────────────
# Starts infra services: postgres, qdrant, redis, ollama (+ optional pgAdmin).
# Run backend (FastAPI) and frontend (Next.js) directly on the host.
#
# ▶ Using Podman (recommended):
#     cd infra
#     podman compose up -d
#
# ▶ For fully-containerised run (builds backend + frontend images):
#     podman compose --profile full up -d
#
# ▶ Pull a model into ollama after first start:
#     podman exec -it aicc-ollama ollama pull qwen2.5-coder
#     podman exec -it aicc-ollama ollama pull mxbai-embed-large
# ─────────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aicc-postgres
    environment:
      POSTGRES_DB: aicc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../backend/scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aicc"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aicc-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aicc.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: aicc-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: aicc-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: aicc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ── Full-stack containers (opt-in) ──────────────────────────────────────────
  api:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: aicc-api
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-mxbai-embed-large}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5-coder}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-60}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: code_chunks
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: aicc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      VECTOR_DIM: ${VECTOR_DIM:-1024}
      REPO_CACHE_DIR: .repo_cache
      MAX_INDEX_FILE_SIZE_BYTES: 1000000
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@aicc.dev}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-password123}
      BOOTSTRAP_ADMIN_FULL_NAME: ${BOOTSTRAP_ADMIN_FULL_NAME:-Platform Admin}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_started

  web:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: aicc-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/v1
      API_INTERNAL_URL: http://api:8000/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  pgadmin_data:
  qdrant_data:
  redis_data:
  ollama_data:
